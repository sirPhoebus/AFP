services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: afp
      POSTGRES_PASSWORD: afp
      POSTGRES_DB: afp
    ports:
      - "54329:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U afp -d afp"]
      interval: 2s
      timeout: 2s
      retries: 20

  redis:
    image: redis:7-alpine
    ports:
      - "6389:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 2s
      retries: 20
